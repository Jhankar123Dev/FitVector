name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/e2e.yml'
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        # Run the four no-auth project groups in parallel shards. Role-scoped
        # specs (seeker/employer/admin) all run inside the "role" shard since
        # they share a single dev-server instance and storage-state setup.
        project: [role, auth, public, anon, api]

    env:
      # Env vars marked NEXT_PUBLIC_* are inlined at build time but the dev
      # server reads runtime values, so we pass both forms here.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_TEST_MODE: 'true'
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      # Stub out third-party providers — tests use mocks via page.route()
      RESEND_API_KEY: ''
      GEMINI_API_KEY: 'test-stub'
      UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
      UPSTASH_REDIS_TOKEN: ${{ secrets.UPSTASH_REDIS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/web/package.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: apps/web
        run: npx playwright install-deps chromium

      - name: Build web app
        working-directory: apps/web
        run: pnpm build

      - name: Run Playwright tests — role-scoped (seeker + employer + admin)
        if: matrix.project == 'role'
        working-directory: apps/web
        run: |
          npx playwright test \
            --project=setup:seeker \
            --project=setup:employer \
            --project=setup:admin \
            --project=seeker \
            --project=employer \
            --project=admin

      - name: Run Playwright tests — ${{ matrix.project }}
        if: matrix.project != 'role'
        working-directory: apps/web
        run: npx playwright test --project=${{ matrix.project }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload test artifacts (videos, screenshots, traces)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ matrix.project }}
          path: apps/web/test-results/
          retention-days: 14

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.project }}
          path: apps/web/test-results/junit.xml
          retention-days: 30
